# =====================================
# MONOKAI PRO TMUX CONFIGURATION
# =====================================

# -- general -------------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",*:Ms=\\E]52;c;%p2%s\\7"

set -s escape-time 10                     # faster command sequences
set -sg repeat-time 600                   # increase repeat timeout
set -s focus-events on

set -g default-shell /usr/bin/zsh         # new panes/windows always run zsh

set -g prefix2 C-a                        # GNU-Screen compatible prefix
bind C-a send-prefix -2

set -g history-limit 10000                # boost history

# reload configuration
bind r source-file ~/.tmux.conf \; display '~/.tmux.conf sourced'

# -- display -------------------------------------------------------------------

set -g base-index 1           # start windows numbering at 1
setw -g pane-base-index 1     # make pane numbering consistent with windows

setw -g automatic-rename on   # rename window to reflect current program
set -g renumber-windows on    # renumber windows when a window is closed

set -g set-titles on          # set terminal title

set -g display-panes-time 800 # slightly longer pane indicators display time
set -g display-time 1000      # slightly longer status messages display time

set -g status-interval 10     # redraw status line every 10 seconds

# activity
set -g monitor-activity on
set -g visual-activity off

# mouse support
set -g mouse on

# better scrolling
set -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# -- navigation ----------------------------------------------------------------

# create session
bind C-c new-session

# create window in current directory
bind c new-window -c "#{pane_current_path}"

# find session
bind C-f command-prompt -p find-session 'switch-client -t %%'

# quick splits - create new panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# split current window horizontally
bind - split-window -v -c "#{pane_current_path}"
# split current window vertically  
bind _ split-window -h -c "#{pane_current_path}"

# Vim awareness check
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

# Navigation (Ctrl+hjkl) - works in both tmux and nvim
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Alt+Arrows pass through to shell / Claude Code for word movement.
# (Use prefix + arrow keys to resize panes if needed.)
unbind -n M-Left
unbind -n M-Right
unbind -n M-Up
unbind -n M-Down

# window navigation with Alt (no prefix needed)
# Kitty sends Unicode chars for Alt+hjkl: ˙∆˚¬
bind -n '˙' previous-window       # Alt+h (˙)
bind -n '¬' next-window           # Alt+l (¬)
bind -n '∆' switch-client -p      # Alt+j (∆)
bind -n '˚' switch-client -n      # Alt+k (˚)
bind -n '˜' send-keys '˜'        # Alt+n - pass through to shell for notify
bind -n 'ç' send-keys 'ç'        # Alt+c - pass through to shell for copy

# window selection with Alt+number (no prefix needed)
# Kitty sends these Unicode characters for Alt+1234567890: ¡™£¢∞§¶•ªº
bind -n '¡' select-window -t 1   # Alt+1 (kitty unicode)
bind -n '™' select-window -t 2   # Alt+2
bind -n '£' select-window -t 3   # Alt+3
bind -n '¢' select-window -t 4   # Alt+4
bind -n '∞' select-window -t 5   # Alt+5
bind -n '§' select-window -t 6   # Alt+6
bind -n '¶' select-window -t 7   # Alt+7
bind -n '•' select-window -t 8   # Alt+8
bind -n 'ª' select-window -t 9   # Alt+9
bind -n 'º' select-window -t 0   # Alt+0

# standard Meta-N escape sequences (non-kitty terminals)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 0

# window navigation
bind Tab last-window        # move to last active window

# window management
bind , command-prompt -I "#W" "rename-window '%%'"  # rename window
bind $ command-prompt -I "#S" "rename-session '%%'" # rename session
bind . command-prompt "move-window -t '%%'"         # move window
bind > swap-window -t +1 \; select-window -t +1     # swap with next window
bind < swap-window -t -1 \; select-window -t -1     # swap with previous window

# pane management
bind x confirm-before -p "kill pane? (y/n)" kill-pane      # kill pane (with confirm)
bind X confirm-before -p "kill window? (y/n)" kill-window  # kill window (with confirm)
bind z resize-pane -Z                               # zoom pane

# pane resize with Alt+Shift+hjkl (no prefix)
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5
bind Space next-layout                              # cycle layouts
bind = select-layout even-horizontal                # balance panes horizontally
bind | select-layout even-vertical                  # balance panes vertically

# toggle mouse
bind m set -g mouse \; display "Mouse: #{?mouse,ON,OFF}"

# toggle synchronize panes (type in all panes at once)
bind S setw synchronize-panes \; display "Sync: #{?synchronize-panes,ON,OFF}"

# clear history
bind C-l send-keys C-l \; clear-history

# help
bind ? display-popup -E -w 78 -h 36 "bash \"$HOME/.tmux/tmux-help.sh\" && read -n 1"

# -- monokai pro color scheme --------------------------------------------------

# Pane borders
set -g pane-border-style 'fg=#403e41'
set -g pane-active-border-style 'fg=#a9dc76'

# Status bar
set -g status-style 'bg=#2d2a2e,fg=#fcfcfa'
set -g status-left-length 40
set -g status-right-length 100

# Status left
set -g status-left '#[fg=#2d2a2e,bg=#a9dc76,bold] #S #[fg=#a9dc76,bg=#403e41,nobold]#[fg=#fcfcfa,bg=#403e41] #(whoami) #[fg=#403e41,bg=#2d2a2e,nobold]'

# Status right
set -g status-right '#{prefix_highlight} #[fg=#403e41,bg=#2d2a2e]#[fg=#fcfcfa,bg=#403e41] %H:%M #[fg=#727072]│#[fg=#fcfcfa] %d %b %Y #[fg=#78dce8,bg=#403e41]#[fg=#2d2a2e,bg=#78dce8,bold] #H '

# Window status
set -g window-status-format '#[fg=#2d2a2e,bg=#403e41]#[fg=#fcfcfa,bg=#403e41] #I #[fg=#727072]│#[fg=#fcfcfa] #W #[fg=#403e41,bg=#2d2a2e]'
set -g window-status-current-format '#[fg=#2d2a2e,bg=#ff6188]#[fg=#2d2a2e,bg=#ff6188,bold] #I #[fg=#2d2a2e]│#[fg=#2d2a2e] #W #[fg=#ff6188,bg=#2d2a2e]'

# Window status activity
set -g window-status-activity-style 'fg=#ffd866,bg=#403e41'

# Messages
set -g message-style 'fg=#2d2a2e,bg=#ffd866,bold'
set -g message-command-style 'fg=#2d2a2e,bg=#ffd866,bold'

# Mode
set -g mode-style 'fg=#2d2a2e,bg=#ab9df2,bold'

# Clock
set -g clock-mode-colour '#78dce8'
set -g clock-mode-style 24

# Command prompt
set -g message-style 'fg=#2d2a2e,bg=#ffd866,bold'

# Display panes (when you press prefix + q)
set -g display-panes-active-colour '#a9dc76'
set -g display-panes-colour '#727072'

# -- plugins -------------------------------------------------------------------

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'sainnhe/tmux-fzf'                     # prefix+F for fuzzy session/window/pane picker

# Plugin settings
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @prefix_highlight_fg '#2d2a2e'
set -g @prefix_highlight_bg '#ff6188'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=#2d2a2e,bg=#ffd866,bold'

# Fix italics and bold (already set at top of file)
# set -g default-terminal is set to "screen-256color" at line 7
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable italic font support
set -as terminal-overrides ',xterm*:sitm=\E[3m'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Alt+hjkl for standard terminals (escape sequence M-hjkl)
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-j switch-client -p
bind -n M-k switch-client -n

# Enable OSC52 clipboard support for kitty and other modern terminals
# Allow tmux to pass through OSC52 sequences to the terminal
set -s set-clipboard on
set -gq allow-passthrough on

# Enable vi mode in copy mode
setw -g mode-keys vi

# Vi-style copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Make tmux copy mode send OSC52 sequences
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel
