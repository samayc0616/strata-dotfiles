# kitty.conf

## Font
font_family MesloLGM Nerd Font Mono
font_size 14.0

## Default editor
editor /opt/homebrew/bin/nvim

## macOS: Treat Option as Alt
macos_option_as_alt yes

## Colors
background #2d2a2e
foreground #fcfcfa
cursor     #fcfcfa

# Selection colors
selection_background #403e41
selection_foreground #fcfcfa

# 16-color palette
color0  #19181a
color1  #ff6188
color2  #a9dc76
color3  #ffd866
color4  #78dce8
color5  #ab9df2
color6  #78dce8
color7  #c1c0c0
color8  #5b595c
color9  #ff6188
color10 #a9dc76
color11 #ffd866
color12 #78dce8
color13 #ab9df2
color14 #78dce8
color15 #fcfcfa

## Terminal features for SSH and remote usage
# Enable OSC52 clipboard support (allows copying from remote sessions)
# no-append fixes Kitty bug where it appends instead of replacing clipboard
clipboard_control write-clipboard write-primary no-append

# Allow terminal programs to read/write system clipboard
allow_remote_control yes

## Fix Home and End keys to send standard sequences
# Home sends ^[[1~ and End sends ^[[4~
map home send_text all \x1b[1~
map end send_text all \x1b[4~

